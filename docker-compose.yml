services:
  postgres:
    image: postgres:18.4-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webdiag}
      POSTGRES_USER: ${POSTGRES_USER:-webdiag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webdiag} -d ${POSTGRES_DB:-webdiag}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-webdiag}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  valkey:
    image: valkey/valkey:9.1.0-alpine
    command: ["valkey-server", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - valkey_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      WEBDIAG_ENVIRONMENT: development
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      WEBDIAG_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-webdiag}:${RABBITMQ_DEFAULT_PASS:-change-me}@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PUBLIC_RELEASE: "false"
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  valkey_data:
